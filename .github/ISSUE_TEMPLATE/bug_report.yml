name: Bug report
description: Report a reproducible problem.
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the issue you're experiencing.
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: yet-another-react-lightbox-lite version
      placeholder: e.g., 1.2.0
    validations:
      required: true

  - type: input
    id: react-version
    attributes:
      label: React version
      placeholder: e.g., 19.2.0
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g., Chrome 148, Safari 26.3.1
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g., macOS 26.4.1
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        Provide a minimal reproduction by forking the
        [sandbox template](https://stackblitz.com/edit/yet-another-react-lightbox-lite?file=src%2FApp.tsx),
        or share code snippets and steps to reproduce. Keep it as small as possible.
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs. actual behavior
      description: |
        Describe what you expected to happen and what actually happened.
        Include screenshots or error output where relevant.
    validations:
      required: true
