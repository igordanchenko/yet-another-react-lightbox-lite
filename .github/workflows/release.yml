name: Release

on:
  push:
    branches: [main, next]

concurrency:
  group: release

permissions:
  contents: write
  id-token: write
  issues: write
  discussions: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: github.repository == 'igordanchenko/yet-another-react-lightbox-lite'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build, Test, Lint
        run: npm run ci

      - name: Verify dependency signatures
        run: npm audit signatures

      - name: Prune package.json
        run: npm pkg delete scripts devDependencies

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx \
            --package semantic-release@25 \
            --package conventional-changelog-conventionalcommits@9 \
            semantic-release
