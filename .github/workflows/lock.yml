name: Lock

on:
  schedule:
    - cron: "47 9 * * 0"
  workflow_dispatch:

permissions:
  issues: write
  discussions: write
  pull-requests: write

concurrency:
  group: lock

jobs:
  action:
    name: Lock
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: github.repository == 'igordanchenko/yet-another-react-lightbox-lite'

    steps:
      - uses: dessant/lock-threads@7266a7ce5c1df01b1c6db85bf8cd86c737dadbe7 # v6.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-lock-reason: ""
          issue-lock-reason: ""
          pr-inactive-days: "180"
          issue-inactive-days: "180"
          discussion-inactive-days: "180"
