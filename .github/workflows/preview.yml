name: Preview

on:
  pull_request:
    branches: [main, next]
  workflow_dispatch:

permissions: {}

jobs:
  preview:
    name: Publish preview package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: github.repository == 'igordanchenko/yet-another-react-lightbox-lite'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build, Test, Lint
        run: npm run ci

      - name: Verify dependency signatures
        run: npm audit signatures

      - name: Prune package.json
        run: npm pkg delete scripts devDependencies

      - name: Publish preview
        run: npx pkg-pr-new publish --no-template
